    username: test_ext_auth_cert_happy
    userID: test_ext_auth_cert_happy
  - email: test_ext_auth_token_happy@test.com
    hash: *password
    username: test_ext_auth_token_happy
    userID: test_ext_auth_token_happy
  - email: test_ext_auth_name_selector@test.com
