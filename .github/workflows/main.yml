name: Main Test Workflow
on:
  workflow_dispatch:
    inputs:
      ziti_version:
        description: "ziti release tag to test against (e.g. v2.0.0); blank = newest + v2.0/v1.6 matrix"
        required: false
        default: ""
      zetA_version:
        description: "ziti-edge-tunnel release tag for zetA; blank = build from this branch"
        required: false
        default: ""
      zetB_version:
        description: "ziti-edge-tunnel release tag for zetB; blank = same binary as zetA"
        required: false
        default: ""
      idp_version:
        description: "dex IdP version tag (e.g. v2.45.1); blank = script default"
        required: false
        default: ""
  push:
    branches:
      - main
      - release-v*
  pull_request:
    branches:
      - main
      - release-v*

# cancel older, redundant runs of same workflow on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  call-cmake-build:
    name: Call CMake Build
    uses: ./.github/workflows/cmake.yml

  docker-deployments:
    needs: [ call-cmake-build ]
    name: Exercise CMake Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Full Checkout to Allow CMake to Find Version with Git
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download CMake Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: linux-x64
          path: ./downloads
          digest-mismatch: error

      - name: Unpack CMake Artifacts
        shell: bash
        run: |
          set -x
          ls -horRAS ./downloads
          mkdir -p ./build/amd64/linux/
          unzip -d ./build/amd64/linux/ ./downloads/ziti-edge-tunnel-Linux_x86_64.zip

      - name: Run the Compose Test Script
        shell: bash
        run: docker/docker.test.bash
        env:
          I_AM_ROBOT: 1
          ZITI_EDGE_TUNNEL_BIN: ./build/amd64/linux/ziti-edge-tunnel

  # Resolve which ziti releases the matrix runs against. A manual run with
  # ziti_version set tests that single tag; otherwise the newest release plus the
  # newest patch of the LTS lines named in openziti/ziti's lts-versions.json.
  resolve-ziti-versions:
    name: Resolve ziti versions
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.resolve.outputs.channels }}
    steps:
      - name: Resolve channels
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_ZITI: ${{ inputs.ziti_version }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_ZITI:-}" ]; then
            channels=$(jq -cn --arg t "$DISPATCH_ZITI" '[{label:$t, tag:$t}]')
          else
            tags=$(gh release list --repo openziti/ziti --limit 200 \
                     --json tagName,isDraft,isPrerelease \
                   | jq -r '.[] | select(.isDraft==false and .isPrerelease==false) | .tagName')
            newest_matching() { printf '%s\n' "$tags" | grep -E "$1" | sort -V | tail -n1; }
            lts_versions=$(gh api -X GET repos/openziti/ziti/contents/lts-versions.json -H "Accept: application/vnd.github.raw")
            active_line=$(printf '%s' "$lts_versions" | jq -r '.active')
            maint_line=$(printf '%s' "$lts_versions" | jq -r '.maintenance')
            line_regex() { printf '^v%s\\.' "$(printf '%s' "$1" | sed 's/\./\\./g')"; }
            latest=$(printf '%s\n' "$tags" | sort -V | tail -n1)
            lts=$(newest_matching "$(line_regex "$active_line")")
            maint=$(newest_matching "$(line_regex "$maint_line")")
            for v in "$latest" "$lts" "$maint"; do
              [ -n "$v" ] || { echo "::error::failed to resolve a ziti version (latest=$latest lts=$lts maint=$maint)"; exit 1; }
            done
            case "$maint" in
              v1.*) ;;
              *) echo "::error::maintenance channel resolved to $maint (not 1.x): remove the ziti 1.6 workarounds (main_test.go OS-trust fail-fast, Overlay.RequireCATrusted 1.6 skip) and this check"; exit 1 ;;
            esac
            if [ "$latest" = "$lts" ]; then
              channels=$(jq -cn --arg lts "$lts" --arg maint "$maint" \
                '[{label:"lts",tag:$lts},{label:"lts-maintenance",tag:$maint}]')
            else
              channels=$(jq -cn --arg latest "$latest" --arg lts "$lts" --arg maint "$maint" \
                '[{label:"latest",tag:$latest},{label:"lts",tag:$lts},{label:"lts-maintenance",tag:$maint}]')
            fi
          fi
          echo "resolved channels: $channels"
          echo "channels=$channels" >> "$GITHUB_OUTPUT"

  integration-tests:
    name: Integration Tests (${{ matrix.ziti-channel.label }} ${{ matrix.ziti-channel.tag }})
    needs: [ call-cmake-build, resolve-ziti-versions ]
    strategy:
      fail-fast: false
      matrix:
        ziti-channel: ${{ fromJSON(needs.resolve-ziti-versions.outputs.channels) }}
    uses: ./.github/workflows/integration-tests.yml
    with:
      ziti-version: ${{ matrix.ziti-channel.tag }}
      label: ${{ matrix.ziti-channel.label }}
      idp-version: ${{ inputs.idp_version }}
      zetA-version: ${{ inputs.zetA_version }}
      zetB-version: ${{ inputs.zetB_version }}
    secrets: inherit

  nix-build:
    name: Build Nix Binary
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Ziti Edge Tunnel
        run: |
          nix build
          ./result/bin/ziti-edge-tunnel version
