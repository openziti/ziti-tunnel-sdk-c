name: Main Test Workflow
on:
  workflow_dispatch:
    inputs:
      ziti_version:
        description: "ziti release tag to test against (e.g. v2.0.0); blank = newest + LTS matrix"
        required: false
        default: ""
      zet1_version:
        description: "ziti-edge-tunnel release tag for zet1/zetA; blank = build from this branch"
        required: false
        default: ""
      zet2_version:
        description: "ziti-edge-tunnel release tag for zet2/zetB; blank = same binary as zet1"
        required: false
        default: ""
      idp_version:
        description: "dex IdP version tag (e.g. v2.45.1); blank = script default"
        required: false
        default: ""
  push:
    branches:
      - main
      - release-v*
  pull_request:
    branches:
      - main
      - release-v*

# cancel older, redundant runs of same workflow on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  call-cmake-build:
    name: Call CMake Build
    uses: ./.github/workflows/cmake.yml

  docker-deployments:
    needs: [ call-cmake-build ]
    name: Exercise CMake Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Full Checkout to Allow CMake to Find Version with Git
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download CMake Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: linux-x64
          path: ./downloads
          digest-mismatch: error

      - name: Unpack CMake Artifacts
        shell: bash
        run: |
          set -x
          ls -horRAS ./downloads
          mkdir -p ./build/amd64/linux/
          unzip -d ./build/amd64/linux/ ./downloads/ziti-edge-tunnel-Linux_x86_64.zip

      - name: Run the Compose Test Script
        shell: bash
        run: docker/docker.test.bash
        env:
          I_AM_ROBOT: 1
          ZITI_EDGE_TUNNEL_BIN: ./build/amd64/linux/ziti-edge-tunnel

  # Resolve which ziti releases the matrix runs against. A manual run with
  # ziti_version set tests that single tag; otherwise the newest release plus the
  # newest patch of the LTS-current (v2.0) and LTS-maintenance (v1.6) lines.
  resolve-ziti-versions:
    name: Resolve ziti versions
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.resolve.outputs.channels }}
    steps:
      - name: Resolve channels
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_ZITI: ${{ inputs.ziti_version }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_ZITI:-}" ]; then
            channels=$(jq -cn --arg t "$DISPATCH_ZITI" '[{label:$t, tag:$t}]')
          else
            tags=$(gh release list --repo openziti/ziti --limit 200 \
                     --json tagName,isDraft,isPrerelease \
                   | jq -r '.[] | select(.isDraft==false and .isPrerelease==false) | .tagName')
            newest_matching() { printf '%s\n' "$tags" | grep -E "$1" | sort -V | tail -n1; }
            latest=$(printf '%s\n' "$tags" | sort -V | tail -n1)
            lts=$(newest_matching '^v2\.0\.')
            maint=$(newest_matching '^v1\.6\.')
            for v in "$latest" "$lts" "$maint"; do
              [ -n "$v" ] || { echo "::error::failed to resolve a ziti version (latest=$latest lts=$lts maint=$maint)"; exit 1; }
            done
            channels=$(jq -cn --arg latest "$latest" --arg lts "$lts" --arg maint "$maint" \
              '[{label:"latest",tag:$latest},{label:"lts",tag:$lts},{label:"lts-maintenance",tag:$maint}]')
          fi
          echo "resolved channels: $channels"
          echo "channels=$channels" >> "$GITHUB_OUTPUT"

  integration-tests:
    name: Integration Tests (${{ matrix.os.name }} / ziti ${{ matrix.ziti-channel.label }})
    needs: [ call-cmake-build, resolve-ziti-versions ]
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux x64
            runner: ubuntu-latest
            artifact: linux-x64
            zet-zip: ziti-edge-tunnel-Linux_x86_64.zip
            zet-bin: ziti-edge-tunnel
            ziti-pattern: ziti-linux-amd64-*.tar.gz
            sudo: sudo -E env "PATH=$PATH"
            create-group: sudo groupadd --system ziti
            core-dir: /tmp/cores
          - name: macOS arm64
            runner: macos-15
            artifact: macOS-arm64
            zet-zip: ziti-edge-tunnel-Darwin_arm64.zip
            zet-bin: ziti-edge-tunnel
            ziti-pattern: ziti-darwin-arm64-*.tar.gz
            sudo: sudo -E env "PATH=$PATH"
            create-group: sudo dseditgroup -o create ziti
            core-dir: /cores
          - name: Windows x64
            runner: windows-2022
            artifact: windows-x64-mingw
            zet-zip: ziti-edge-tunnel-Windows_x86_64.zip
            zet-bin: ziti-edge-tunnel.exe
            ziti-pattern: ziti-windows-amd64-*.zip
            sudo: ""
            create-group: ""
            core-dir: ""
        ziti-channel: ${{ fromJSON(needs.resolve-ziti-versions.outputs.channels) }}
    runs-on: ${{ matrix.os.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tests/integration/go.mod
          cache-dependency-path: tests/integration/go.sum

      - name: Download CMake Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.os.artifact }}
          path: ./zet-artifact
          digest-mismatch: error

      - name: Resolve ziti-edge-tunnel binaries (zet1 / zet2)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZET1_VERSION: ${{ inputs.zet1_version }}
          ZET2_VERSION: ${{ inputs.zet2_version }}
          ZET_ZIP: ${{ matrix.os.zet-zip }}
          ZET_BIN_NAME: ${{ matrix.os.zet-bin }}
        run: |
          set -euo pipefail
          # the built artifact is the default binary for both instances
          unzip -o "zet-artifact/$ZET_ZIP" -d zet-artifact
          chmod +x "zet-artifact/$ZET_BIN_NAME" || true
          ZET_BIN="$PWD/zet-artifact/$ZET_BIN_NAME"
          ZET_BIN_B="$ZET_BIN"
          # optional per-instance release overrides
          if [ -n "${ZET1_VERSION:-}" ]; then
            mkdir -p zet1
            gh release download --repo openziti/ziti-tunnel-sdk-c "$ZET1_VERSION" --pattern "$ZET_ZIP" --dir zet1
            unzip -o "zet1/$ZET_ZIP" -d zet1
            chmod +x "zet1/$ZET_BIN_NAME" || true
            ZET_BIN="$PWD/zet1/$ZET_BIN_NAME"
          fi
          if [ -n "${ZET2_VERSION:-}" ]; then
            mkdir -p zet2
            gh release download --repo openziti/ziti-tunnel-sdk-c "$ZET2_VERSION" --pattern "$ZET_ZIP" --dir zet2
            unzip -o "zet2/$ZET_ZIP" -d zet2
            chmod +x "zet2/$ZET_BIN_NAME" || true
            ZET_BIN_B="$PWD/zet2/$ZET_BIN_NAME"
          fi
          echo "ZET_BIN=$ZET_BIN" >> "$GITHUB_ENV"
          echo "ZET_BIN_B=$ZET_BIN_B" >> "$GITHUB_ENV"

      - name: Download ziti CLI (${{ matrix.ziti-channel.label }} = ${{ matrix.ziti-channel.tag }})
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZITI_TAG: ${{ matrix.ziti-channel.tag }}
          ZITI_PATTERN: ${{ matrix.os.ziti-pattern }}
        run: |
          mkdir -p ziti-cli && cd ziti-cli
          gh release download --repo openziti/ziti "$ZITI_TAG" --pattern "$ZITI_PATTERN"
          if ls *.tar.gz >/dev/null 2>&1; then tar -xzf *.tar.gz; fi
          if ls *.zip    >/dev/null 2>&1; then unzip -o *.zip; fi
          ZITI=$(find . -type f \( -name ziti -o -name ziti.exe \) | head -n1)
          chmod +x "$ZITI" || true
          ZITI_ABS=$(cd "$(dirname "$ZITI")" && pwd)/$(basename "$ZITI")
          echo "ZITI_BIN=$ZITI_ABS" >> "$GITHUB_ENV"
          "$ZITI_ABS" --version || true

      - name: Build IdP
        shell: bash
        env:
          IDP_VERSION: ${{ inputs.idp_version }}
        run: |
          if [ -n "${IDP_VERSION:-}" ]; then export VERSION="$IDP_VERSION"; fi
          DEST="$RUNNER_TEMP/dex-build" tests/integration/scripts/fetch-dex.sh
          case "$(uname -s)" in
            MINGW*|MSYS*|CYGWIN*) IDP_BIN="$RUNNER_TEMP/dex-build/dex.exe" ;;
            *) IDP_BIN="$RUNNER_TEMP/dex-build/dex" ;;
          esac
          echo "IDP_BIN=$IDP_BIN" >> "$GITHUB_ENV"

      - name: Create ziti group
        if: ${{ matrix.os.create-group != '' }}
        shell: bash
        run: ${{ matrix.os.create-group }}

      - name: Configure core dumps
        if: ${{ matrix.os.core-dir != '' }}
        shell: bash
        run: |
          sudo mkdir -p "${{ matrix.os.core-dir }}"
          sudo chmod 1777 "${{ matrix.os.core-dir }}"
          if [ "$(uname -s)" = "Linux" ]; then
            echo '${{ matrix.os.core-dir }}/core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern
            # Allow core dumps from processes that change credentials (capabilities).
            # Default suid_dumpable=0 suppresses cores from such processes.
            echo 1 | sudo tee /proc/sys/fs/suid_dumpable
          elif [ "$(uname -s)" = "Darwin" ]; then
            sudo sysctl -w kern.corefile="${{ matrix.os.core-dir }}/core.%N.%P"
          fi

      - name: Seed test overlay PKI
        shell: bash
        run: |
          "$ZITI_BIN" edge quickstart --home="$RUNNER_TEMP" \
            --ctrl-address=localhost --ctrl-port=1280 \
            --router-address=localhost --router-port=3022 &
          until curl -sk --max-time 2 https://localhost:1280/ >/dev/null \
             && (echo > /dev/tcp/localhost/3022) 2>/dev/null; do
            if (( SECONDS > 120 )); then
              echo "::error::overlay never came up within 120s" >&2
              kill %1 2>/dev/null
              exit 1
            fi
            sleep 1
          done
          kill %1
          wait %1 2>/dev/null || true

      - name: Install test overlay CA into OS trust (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo cp "$RUNNER_TEMP/pki/root-ca/certs/root-ca.cert" \
            /usr/local/share/ca-certificates/ziti-test.crt
          sudo update-ca-certificates

      - name: Install test overlay CA into OS trust (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain \
            "$RUNNER_TEMP/pki/root-ca/certs/root-ca.cert"

      - name: Install test overlay CA into OS trust (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Import-Certificate `
            -FilePath "$env:RUNNER_TEMP\pki\root-ca\certs\root-ca.cert" `
            -CertStoreLocation Cert:\LocalMachine\Root | Out-Null

      - name: Write integration test config
        shell: bash
        working-directory: tests/integration
        run: |
          jq -n \
            --arg testHome "$RUNNER_TEMP" \
            --arg zitiBin  "$ZITI_BIN" \
            --arg zetBin   "$ZET_BIN" \
            --arg zetBinB  "$ZET_BIN_B" \
            --arg idpBin   "$IDP_BIN" \
            '{
              testHome: $testHome,
              ziti: { binary: $zitiBin, url: "", user: "admin", password: "admin" },
              zetA: { binary: $zetBin,  verbosity: 4, tlsuvDebug: 0 },
              zetB: { binary: $zetBinB, verbosity: 4, tlsuvDebug: 0 },
              idp: {
                seedIdP: true,
                binary: $idpBin,
                issuer: "",
                clientId: "ziti-test",
                extraClientIds: ["ziti-test-2", "ziti-test-3"],
                audience: "ziti-test",
                sub: "",
                scopes: "openid profile email",
                user: { email: "test@example.com", username: "test", userID: "08a8684b-db88-4b73-90a9-3cd1661f5466", password: "password" }
              }
            }' > config.json
          cat config.json

      - name: Run integration tests
        shell: bash
        working-directory: tests/integration
        run: |
          case "$(uname -s)" in
            Linux|Darwin)
              # ulimit -c unlimited must be set inside the privileged shell: sudo
              # resets resource limits via PAM, so setting it in the outer shell
              # has no effect on ZET child processes.
              sudo env "PATH=$PATH" \
                sh -c 'ulimit -c unlimited && exec go test ./... -v -timeout 20m -config config.json'
              ;;
            *)
              go test ./... -v -timeout 20m -config config.json
              ;;
          esac

      - name: Uninstall test overlay CA (Linux)
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          sudo rm -f /usr/local/share/ca-certificates/ziti-test.crt
          sudo update-ca-certificates --fresh

      - name: Uninstall test overlay CA (macOS)
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          thumb=$(openssl x509 \
            -in "$RUNNER_TEMP/pki/root-ca/certs/root-ca.cert" \
            -noout -fingerprint -sha1 | sed 's/.*=//' | tr -d ':')
          sudo security delete-certificate -Z "$thumb" /Library/Keychains/System.keychain || true

      - name: Uninstall test overlay CA (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2 `
            "$env:RUNNER_TEMP\pki\root-ca\certs\root-ca.cert"
          Get-ChildItem Cert:\LocalMachine\Root | Where-Object Thumbprint -eq $cert.Thumbprint | Remove-Item

      - name: Log core file backtraces
        if: ${{ failure() && matrix.os.core-dir != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          cores=("${{ matrix.os.core-dir }}"/core.*)
          if [ ${#cores[@]} -eq 0 ]; then
            echo "No core files found in ${{ matrix.os.core-dir }}"
            exit 0
          fi
          # Core files are owned by root (ZET runs as root); use sudo to read them.
          if [ "$(uname -s)" = "Linux" ]; then
            sudo apt-get install -y --no-install-recommends gdb >/dev/null
            for core in "${cores[@]}"; do
              echo "::group::Backtrace: $core"
              sudo gdb -batch \
                -ex "set pagination off" \
                -ex "thread apply all bt full" \
                "$ZET_BIN" "$core" 2>&1 || true
              echo "::endgroup::"
            done
          elif [ "$(uname -s)" = "Darwin" ]; then
            for core in "${cores[@]}"; do
              echo "::group::Backtrace: $core"
              sudo lldb -c "$core" "$ZET_BIN" -b \
                -o "thread backtrace all" \
                -o "quit" 2>&1 || true
              echo "::endgroup::"
            done
          fi

      - name: Upload core files
        if: ${{ failure() && matrix.os.core-dir != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: cores-${{ matrix.os.name }}-ziti-${{ matrix.ziti-channel.label }}
          path: ${{ matrix.os.core-dir }}/core.*
          if-no-files-found: ignore

      - name: Upload integration test logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: integration-logs-${{ matrix.os.name }}-ziti-${{ matrix.ziti-channel.label }}
          path: |
            ${{ runner.temp }}/zets/logs/*.log
            ${{ runner.temp }}/overlay/quickstart-logs/*.log
            ${{ runner.temp }}/idp/logs/*.log
          if-no-files-found: ignore

  nix-build:
    name: Build Nix Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Ziti Edge Tunnel
        run: |
          nix build
          ./result/bin/ziti-edge-tunnel version
